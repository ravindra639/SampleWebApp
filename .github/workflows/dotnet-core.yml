name: Build and Push Docker Image

on:
  workflow_dispatch:
  
  push:
    branches:
      - none

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build \
        -t ${{ secrets.ACR_LOGIN_SERVER }}/dotnet-app:${{ github.sha }} \
        -t ${{ secrets.ACR_LOGIN_SERVER }}/dotnet-app:latest .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/dotnet-app:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/dotnet-app:latest
